version: '3.8'

services:
  tracardi-redis:
    image: redis:7-alpine
    container_name: tracardi_redis
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - tracardi_net
    restart: unless-stopped

  tracardi-mysql:
    image: mysql:8.0
    container_name: tracardi_mysql
    environment:
      MYSQL_ROOT_PASSWORD: tracardi_root_pass_2026
      MYSQL_DATABASE: tracardi
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - tracardi_net
    restart: unless-stopped

  tracardi-api:
    image: tracardi/tracardi-api:latest
    container_name: tracardi_api
    environment:
      REDIS_HOST: tracardi-redis
      REDIS_PORT: 6379
      MYSQL_HOST: tracardi-mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: tracardi
      MYSQL_USER: root
      MYSQL_PASSWORD: tracardi_root_pass_2026
      API_URL: http://20.101.50.244:8686
      TRACKER_URL: http://20.101.50.244:8686
      INSTALLATION_TOKEN: tracardi_eventhub_2026
    ports:
      - "8686:80"
    depends_on:
      - tracardi-redis
      - tracardi-mysql
    networks:
      - tracardi_net
    restart: unless-stopped

  tracardi-gui:
    image: tracardi/tracardi-gui:latest
    container_name: tracardi_gui
    environment:
      API_URL: http://20.101.50.244:8686
    ports:
      - "8787:80"
    depends_on:
      - tracardi-api
    networks:
      - tracardi_net
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:

networks:
  tracardi_net:
    driver: bridge
