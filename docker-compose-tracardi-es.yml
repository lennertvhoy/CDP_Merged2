services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms256m -Xmx256m"
      - bootstrap.memory_lock=false
    volumes:
      - es_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - tracardi_net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  tracardi-redis:
    image: redis:7-alpine
    container_name: tracardi_redis
    volumes:
      - redis_data:/data
    networks:
      - tracardi_net
    restart: unless-stopped

  tracardi-mysql:
    image: mysql:8.0
    container_name: tracardi_mysql
    environment:
      MYSQL_ROOT_PASSWORD: tracardi_root_pass_2026
      MYSQL_DATABASE: tracardi
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - tracardi_net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  tracardi-api:
    image: tracardi/tracardi-api:latest
    container_name: tracardi_api
    environment:
      ELASTIC_HOST: http://elasticsearch:9200
      REDIS_HOST: tracardi-redis
      REDIS_PORT: 6379
      MYSQL_HOST: tracardi-mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: tracardi
      MYSQL_USER: root
      MYSQL_PASSWORD: tracardi_root_pass_2026
      API_URL: ${TRACARDI_PUBLIC_URL:-http://localhost:8686}
      TRACKER_URL: ${TRACARDI_PUBLIC_URL:-http://localhost:8686}
      INSTALLATION_TOKEN: tracardi_eventhub_2026
    ports:
      - "8686:80"
    depends_on:
      - elasticsearch
      - tracardi-redis
      - tracardi-mysql
    networks:
      - tracardi_net
    restart: unless-stopped

  tracardi-gui:
    image: tracardi/tracardi-gui:latest
    container_name: tracardi_gui
    environment:
      API_URL: ${TRACARDI_PUBLIC_URL:-http://localhost:8686}
    ports:
      - "8787:80"
    depends_on:
      - tracardi-api
    networks:
      - tracardi_net
    restart: unless-stopped

volumes:
  es_data:
  mysql_data:
  redis_data:

networks:
  tracardi_net:
    driver: bridge
