name: Infra Terraform

on:
  pull_request:
    paths:
      - "infra/terraform/**"
      - ".github/workflows/infra-terraform.yml"
  push:
    branches: [main, develop]
    paths:
      - "infra/terraform/**"
      - ".github/workflows/infra-terraform.yml"
  workflow_dispatch:

concurrency:
  group: infra-terraform-${{ github.ref }}
  cancel-in-progress: true

env:
  TF_IN_AUTOMATION: "true"

jobs:
  terraform-fmt-validate:
    name: Terraform Fmt + Validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: infra/terraform

    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Terraform fmt check
        run: terraform fmt -check -diff

      - name: Terraform init (backend disabled)
        run: terraform init -backend=false -input=false

      - name: Terraform validate
        run: terraform validate

  terraform-security:
    name: Terraform Security Scan
    runs-on: ubuntu-latest
    needs: terraform-fmt-validate
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Run tfsec (SARIF)
        uses: aquasecurity/tfsec-sarif-action@v0.1.4
        with:
          working_directory: infra/terraform
          sarif_file: tfsec-infra-terraform.sarif

      - name: Upload tfsec SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: tfsec-infra-terraform.sarif
        continue-on-error: true

  terraform-plan:
    name: Terraform Plan (CI Safe)
    runs-on: ubuntu-latest
    needs:
      - terraform-fmt-validate
      - terraform-security
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    environment: staging
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: infra/terraform

    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform init (backend disabled)
        run: terraform init -backend=false -input=false

      - name: Terraform plan with rollout-aware variables
        run: |
          mkdir -p ../../artifacts
          terraform plan \
            -input=false \
            -lock=false \
            -refresh=false \
            -compact-warnings \
            -var-file=terraform.tfvars.example \
            -out=tfplan | tee ../../artifacts/infra-terraform-plan.log

      - name: Terraform show plan
        run: terraform show -no-color tfplan > ../../artifacts/infra-terraform-plan.txt

      - name: Upload terraform plan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: infra-terraform-plan
          path: artifacts/
          if-no-files-found: error
