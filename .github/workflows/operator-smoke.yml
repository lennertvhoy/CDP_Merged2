name: Operator Smoke Tests

on:
  push:
    branches: [main, develop, prove/ci-tooling-runtime]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      scope:
        description: 'Smoke test scope'
        required: true
        default: 'local'
        type: choice
        options:
          - local
          - all
      headed:
        description: 'Show browser during tests (headed mode)'
        required: false
        default: false
        type: boolean

concurrency:
  group: operator-smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Change Scope
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.classify.outputs.should_run }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Classify changed files
        id: classify
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
          else
            base_sha="${{ github.event.before }}"
          fi

          if [ -z "${base_sha}" ] || [ "${base_sha}" = "0000000000000000000000000000000000000000" ]; then
            base_sha="$(git rev-list --max-parents=0 HEAD)"
          fi

          mapfile -t changed_files < <(git diff --name-only "${base_sha}" "${GITHUB_SHA}")

          should_run=false
          for file in "${changed_files[@]}"; do
            case "${file}" in
              *.drawio|*.gif|*.jpeg|*.jpg|*.md|*.png|*.svg|*.webp|\
              .python-path|\
              .vscode/*|\
              AGENTS.md|BACKLOG.md|GEMINI.md|HANDOVER_TEMPLATE.md|NEXT_ACTIONS.md|PROJECT_STATE.yaml|PROJECT_STATUS_SUMMARY.md|STATUS.md|WORKLOG.md|\
              docs/*|logs/*|reports/*|environment.yml)
                ;;
              *)
                should_run=true
                break
                ;;
            esac
          done

          echo "should_run=${should_run}" >> "${GITHUB_OUTPUT}"

  operator-smoke-local:
    name: Operator Shell Smoke Tests (Local)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.should_run == 'true'
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: cdpadmin
          POSTGRES_PASSWORD: cdpadmin123
          POSTGRES_DB: cdp
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://cdpadmin:cdpadmin123@localhost:5432/cdp?sslmode=disable
      LLM_PROVIDER: mock
      OPENAI_API_KEY: test-key-not-real
      TRACARDI_API_URL: http://localhost:8686
      TRACARDI_USERNAME: admin
      TRACARDI_PASSWORD: admin
      TRACARDI_SOURCE_ID: test-source
      CHAINLIT_AUTH_SECRET: ci-test-secret-32chars-min-required
      CHAINLIT_LOCAL_ACCOUNT_AUTH_ENABLED: "true"
      OPERATOR_SMOKE_A_PASSWORD: smoke-test-password-a-32chars-min
      OPERATOR_SMOKE_B_PASSWORD: smoke-test-password-b-32chars-min
      OPERATOR_API_ORIGIN: http://127.0.0.1:8170
      CHAT_RUNTIME_ORIGIN: http://127.0.0.1:8016

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.10.4"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked

      - name: Install Playwright browsers
        run: |
          uv run --frozen playwright install chromium
          uv run --frozen playwright install-deps chromium

      - name: Setup database schema
        run: |
          uv run --frozen python -c "
          import asyncio
          import asyncpg
          
          async def setup():
              conn = await asyncpg.connect('${DATABASE_URL}')
              # Create minimal schema for smoke tests
              await conn.execute('''
                  CREATE TABLE IF NOT EXISTS app_chat_users (
                      user_id TEXT PRIMARY KEY,
                      identifier TEXT UNIQUE NOT NULL,
                      created_at TIMESTAMP DEFAULT NOW()
                  );
              ''')
              await conn.close()
          
          asyncio.run(setup())
          "

      - name: Start Mock Services
        run: |
          # Start a simple HTTP server for testing
          python3 -c "
          from http.server import HTTPServer, BaseHTTPRequestHandler
          import threading
          
          class Handler(BaseHTTPRequestHandler):
              def do_GET(self):
                  self.send_response(200)
                  self.send_header('Content-type', 'application/json')
                  self.end_headers()
                  if '/healthz' in self.path:
                      self.wfile.write(b'{\"status\": \"ok\"}')
                  elif '/bootstrap' in self.path:
                      self.wfile.write(b'{\"phase\": \"app\", \"session\": {\"authenticated\": true}}')
                  else:
                      self.wfile.write(b'{\"status\": \"ok\"}')
              def log_message(self, format, *args):
                  pass
          
          # Start operator API
          httpd = HTTPServer(('127.0.0.1', 8170), Handler)
          threading.Thread(target=httpd.serve_forever, daemon=True).start()
          
          # Start chat runtime
          httpd2 = HTTPServer(('127.0.0.1', 8016), Handler)
          threading.Thread(target=httpd2.serve_forever, daemon=True).start()
          
          print('Mock services started')
          import time; time.sleep(2)
          "
          echo "MOCK_SERVICES=running" >> $GITHUB_ENV

      - name: Run Operator Smoke Tests
        run: |
          uv run --frozen python scripts/operator_smoke.py run --scope local --skip-reset
        env:
          OPERATOR_SMOKE_LOCAL_BASE_URL: http://127.0.0.1:3000

      - name: Upload smoke test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: operator-smoke-results
          path: |
            output/operator_smoke/
          if-no-files-found: warn

      - name: Summarize Results
        if: always()
        run: |
          echo "## Operator Smoke Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Smoke tests completed!" >> $GITHUB_STEP_SUMMARY
