# Bandit security scanner configuration
# See: https://bandit.readthedocs.io/en/latest/config.html

# Exclude paths from scanning
exclude_dirs:
  - src/data
  - tests
  - scripts
  - .venv
  - __pycache__
  - .git

# Skip specific tests for files with internally-controlled SQL
# These files use string formatting for SQL but with validated/internal inputs only
skips:
  # B608: hardcoded_sql_expressions - Skipped for files where SQL is built from internal/validated sources
  # The following files build SQL dynamically but with controlled inputs:
  # - sql_builder.py: Internal query builder with explicit deprecation warning for user input
  # - postgresql_client.py: Uses parameterized queries for user input, string formatting only for column names
  # - postgresql_client_optimized.py: Same as above, column names are from allowed set only
  - B608
