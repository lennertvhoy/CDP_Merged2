decisions:
  truth_layers_2026_02_26:
    decided_at: 2026-02-26
    status: reported
    summary: Keep PostgreSQL as the customer-intelligence and analytical truth layer and keep Tracardi as the activation/runtime layer.
  separate_stable_rules_from_live_state_2026_03_02:
    decided_at: 2026-03-02
    status: reported
    summary: Keep AGENTS.md limited to stable operating rules while PROJECT_STATE.yaml, STATUS.md, NEXT_ACTIONS.md, BACKLOG.md, and WORKLOG.md carry live or historical operational detail.
  demo_first_under_budget_2026_03_04:
    decided_at: 2026-03-04
    status: reported
    summary: Optimize for a credible demo first, using real source access where available and clearly labeled mocks where access is missing.
  condensed_live_docs_2026_03_06:
    decided_at: 2026-03-06
    status: observed
    summary: Retire extra root summary files and keep the live doc surface to the core files so current state has fewer places to drift.
  exclude_naceless_rows_from_local_cbe_2026_03_06:
    decided_at: 2026-03-06
    status: observed
    summary: The main local-only CBE selector must require usable NACE input and exclude rows lacking both industry_nace_code and enrichment_data.all_nace_codes; treat that residual slice as a separate or API-backed backlog item rather than live-runner work.
